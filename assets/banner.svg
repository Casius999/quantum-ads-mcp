<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 360" role="img" aria-label="quantum-ads-mcp">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b1020"/>
      <stop offset="0.55" stop-color="#141233"/>
      <stop offset="1" stop-color="#0a0f1f"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#818cf8"/>
      <stop offset="0.5" stop-color="#a78bfa"/>
      <stop offset="1" stop-color="#22d3ee"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.82" cy="0.4" r="0.5">
      <stop offset="0" stop-color="#6366f1" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect x="0" y="0" width="1280" height="360" rx="22" fill="url(#bg)"/>
  <rect x="0" y="0" width="1280" height="360" rx="22" fill="url(#glow)"/>

  <!-- network / graph motif (connectors on a core) -->
  <g stroke="#818cf8" stroke-opacity="0.45" stroke-width="2">
    <line x1="1120" y1="180" x2="1040" y2="92"/>
    <line x1="1120" y1="180" x2="1212" y2="116"/>
    <line x1="1120" y1="180" x2="1232" y2="232"/>
    <line x1="1120" y1="180" x2="1086" y2="288"/>
    <line x1="1120" y1="180" x2="1188" y2="300"/>
    <line x1="1040" y1="92" x2="1212" y2="116" stroke-opacity="0.2"/>
    <line x1="1232" y1="232" x2="1188" y2="300" stroke-opacity="0.2"/>
  </g>
  <g fill="#0e1430" stroke="#a78bfa" stroke-width="2.5">
    <circle cx="1040" cy="92" r="10"/>
    <circle cx="1212" cy="116" r="10"/>
    <circle cx="1232" cy="232" r="10"/>
    <circle cx="1086" cy="288" r="10"/>
    <circle cx="1188" cy="300" r="10"/>
  </g>
  <circle cx="1120" cy="180" r="20" fill="url(#title)"/>

  <!-- label -->
  <text x="64" y="104" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="21" letter-spacing="3" fill="#5eead4">GOOGLE ADS &#215; MODEL CONTEXT PROTOCOL</text>

  <!-- title -->
  <text x="62" y="196" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="82" font-weight="800" fill="url(#title)">quantum-ads-mcp</text>
  <rect x="66" y="214" width="600" height="6" rx="3" fill="url(#title)" fill-opacity="0.85"/>

  <!-- tagline -->
  <text x="66" y="258" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="25" fill="#cbd5e1">The sovereign control plane for the entire Google marketing stack.</text>

  <!-- pills -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="17" font-weight="600">
    <rect x="64"  y="286" width="158" height="38" rx="19" fill="#312e81" fill-opacity="0.55" stroke="#6366f1"/>
    <text x="143" y="311" text-anchor="middle" fill="#e0e7ff">20 connectors</text>
    <rect x="238" y="286" width="172" height="38" rx="19" fill="#312e81" fill-opacity="0.55" stroke="#6366f1"/>
    <text x="324" y="311" text-anchor="middle" fill="#e0e7ff">Google Ads v24</text>
    <rect x="426" y="286" width="150" height="38" rx="19" fill="#312e81" fill-opacity="0.55" stroke="#6366f1"/>
    <text x="501" y="311" text-anchor="middle" fill="#e0e7ff">guarded write</text>
    <rect x="592" y="286" width="142" height="38" rx="19" fill="#0f766e" fill-opacity="0.45" stroke="#2dd4bf"/>
    <text x="663" y="311" text-anchor="middle" fill="#ccfbf1">signed audit</text>
  </g>
</svg>
